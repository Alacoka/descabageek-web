type User @table {
  username: String!
  email: String!
  createdAt: Timestamp!
  displayName: String
  bio: String
  profilePictureUrl: String
}

type BlogPost @table {
  title: String!
  content: String!
  createdAt: Timestamp!
  status: String!
  imageUrl: String
  updatedAt: Timestamp
  author: User
}

type Category @table {
  name: String!
  description: String
}

type Tag @table {
  name: String!
}

type Comment @table {
  content: String!
  createdAt: Timestamp!
  updatedAt: Timestamp
  author: User
  blogPost: BlogPost
}

type SubscriptionType @table {
  createdAt: Timestamp!
  subscriber: User!
  publisher: User!
}

type BlogPostCategory @table(key: ["blogPost", "category"]) {
  blogPost: BlogPost!
  category: Category!
}

type BlogPostTag @table(key: ["blogPost", "tag"]) {
  blogPost: BlogPost!
  tag: Tag!
}

type FavoriteBlogPost @table(key: ["user", "blogPost"]) {
  user: User!
  blogPost: BlogPost!
}